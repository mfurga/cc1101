name: Compile

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    name: ${{ matrix.board.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - name: avr-mega
            fqbn: "arduino:avr:mega"
            platforms: |
              - name: arduino:avr
            cli-compile-flags: |
              - --warnings
              - more
              - --build-property
              - compiler.cpp.extra_flags=-Werror
          - name: esp32
            fqbn: "esp32:esp32:esp32"
            platforms: |
              - name: esp32:esp32
                source-url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
            cli-compile-flags: |
              - --warnings
              - all
              - --build-property
              - compiler.cpp.extra_flags=-Werror
              - --build-property
              - compiler.warning_flags.all=-Wall -Wextra -Werror=unused-variable -Werror=unused-function -Werror=unused-but-set-variable -Werror=deprecated-declarations -Wno-error=unused-parameter -Wno-error=sign-compare
          - name: esp8266
            fqbn: "esp8266:esp8266:generic"
            platforms: |
              - name: esp8266:esp8266
                source-url: https://arduino.esp8266.com/stable/package_esp8266com_index.json
            cli-compile-flags: |
              - --warnings
              - all
              - --build-property
              - compiler.cpp.extra_flags=-Werror
          - name: rp2040-pico
            fqbn: "rp2040:rp2040:rpipico"
            platforms: |
              - name: rp2040:rp2040
                source-url: https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
            cli-compile-flags: |
              - --warnings
              - all
              - --build-property
              - compiler.cpp.extra_flags=-Werror
          - name: teensy41
            fqbn: "teensy:avr:teensy41"
            platforms: |
              - name: teensy:avr
                source-url: https://www.pjrc.com/teensy/package_teensy_index.json
            cli-compile-flags: |
              - --build-property
              - build.flags.dep=-MMD -Werror
          - name: stm32-nucleo64
            fqbn: "STMicroelectronics:stm32:Nucleo_64:pnum=NUCLEO_F401RE"
            platforms: |
              - name: STMicroelectronics:stm32
                source-url: https://raw.githubusercontent.com/stm32duino/BoardManagerFiles/main/package_stmicroelectronics_index.json
            cli-compile-flags: |
              - --warnings
              - all
              - --build-property
              - compiler.cpp.extra_flags=-Werror
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Compile examples
        uses: arduino/compile-sketches@8ac27e99289705c4abec832089575d687b859227 # v1.1.2
        with:
          fqbn: ${{ matrix.board.fqbn }}
          platforms: ${{ matrix.board.platforms }}
          libraries: |
            - source-path: ./
          sketch-paths: |
            - examples
          cli-compile-flags: ${{ matrix.board.cli-compile-flags }}
          enable-deltas-report: false
          verbose: false

  check-status:
    name: Compile
    needs: compile
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if any compile job failed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more compile jobs failed or were cancelled"
            exit 1
          fi
